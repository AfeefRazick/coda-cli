<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#27272a" stroke-width="2"/>

  <!-- Top-left terminal dots -->
  <circle cx="60" cy="60" r="7" fill="#3f3f46"/>
  <circle cx="84" cy="60" r="7" fill="#3f3f46"/>
  <circle cx="108" cy="60" r="7" fill="#3f3f46"/>

  <!-- Prompt line -->
  <text x="60" y="210" font-family="ui-monospace,monospace" font-size="22" fill="#52525b">$</text>
  <text x="84" y="210" font-family="ui-monospace,monospace" font-size="22" fill="#71717a">coda rows list myDoc myTable --all</text>

  <!-- Main title -->
  <text x="60" y="320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="96" font-weight="700" fill="#ffffff" letter-spacing="-4">coda-cli</text>

  <!-- Subtitle -->
  <text x="62" y="390" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" fill="#71717a">Open-source CLI for the Coda API</text>

  <!-- Bottom tag -->
  <text x="62" y="560" font-family="ui-monospace,monospace" font-size="18" fill="#3f3f46">github.com/AfeefRazick/coda-cli</text>

  <!-- Right side decorative code block -->
  <rect x="760" y="260" width="380" height="160" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="784" y="296" font-family="ui-monospace,monospace" font-size="14" fill="#52525b"># authenticate</text>
  <text x="784" y="320" font-family="ui-monospace,monospace" font-size="14" fill="#71717a">$ <tspan fill="#e4e4e7">coda auth login</tspan></text>
  <text x="784" y="352" font-family="ui-monospace,monospace" font-size="14" fill="#52525b"># query rows</text>
  <text x="784" y="376" font-family="ui-monospace,monospace" font-size="14" fill="#71717a">$ <tspan fill="#e4e4e7">coda rows list \</tspan></text>
  <text x="784" y="400" font-family="ui-monospace,monospace" font-size="14" fill="#71717a">    <tspan fill="#e4e4e7">--query "Status=Done"</tspan></text>
</svg>
